<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Pembayaran - R STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-id-container {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .order-id-text {
      font-family: monospace;
      font-size: 14px;
      background: #e8e8e8;
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #5a67d8;
      transform: scale(1.02);
    }
    .copy-btn.copied {
      background: #28a745;
    }
    .payment-method {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 16px;
    }
    .payment-method:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateX(5px);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">🎮 R STORE – ROBUX</div>
  <a href="track.html" class="btn-track">Lacak Pesanan</a>
</nav>

<main class="main">
  <div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">💳 Pilih Metode Pembayaran</h2>
    
    <div id="orderInfo" style="margin-bottom: 30px; padding: 20px; background: #f5f5f5; border-radius: 16px;">
      <p style="margin-bottom: 12px;"><strong>🆔 Order ID:</strong></p>
      <div id="orderIdContainer" class="order-id-container"></div>
      
      <div style="margin-top: 15px;">
        <p><strong>🎮 Jumlah Robux:</strong> <span id="payRobux">0</span></p>
        <p><strong>💰 Total:</strong> <span id="payTotal">Rp 0</span></p>
      </div>
    </div>

    <div class="payment-methods" style="display: flex; flex-direction: column; gap: 12px;">
      <button class="payment-method" data-method="qris">
        <span>📱 QRIS (Scan QRIS)</span>
      </button>
      <button class="payment-method" data-method="bca">
        <span>🏦 BCA Virtual Account</span>
      </button>
      <button class="payment-method" data-method="mandiri">
        <span>🏦 Mandiri Virtual Account</span>
      </button>
      <button class="payment-method" data-method="gopay">
        <span>💚 GoPay</span>
      </button>
      <button class="payment-method" data-method="dana">
        <span>💙 DANA</span>
      </button>
    </div>

    <div id="paymentNote" style="margin-top: 20px; font-size: 13px; color: #666; text-align: center;">
      ⚡ Demo mode - Integrasi DOKU akan segera hadir
    </div>
  </div>
</main>

<footer class="footer">© 2025 R Store — Unofficial Roblox Store</footer>

<!-- Di dalam script tag, tambahkan import dan update fungsi -->
<script type="module">
  import { db, doc, getDoc, updateDoc } from './firebase-config.js';
  import { createVirtualAccount, createQRIS, createEWallet, checkPaymentStatus } from './doku-payment.js';

  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('orderId');

  if (!orderId) {
    alert('Order ID tidak ditemukan!');
    window.location.href = 'index.html';
  }

  // ... (fungsi copyToClipboard dan loadOrder sama seperti sebelumnya)

  // Handle pilih metode pembayaran - INTEGRASI DOKU
  document.querySelectorAll('.payment-method').forEach(btn => {
    btn.addEventListener('click', async () => {
      const method = btn.dataset.method;
      const orderRef = doc(db, 'orders', orderId);
      const orderSnap = await getDoc(orderRef);
      const orderData = orderSnap.data();
      const amount = orderData.totalPrice;
      
      // Tampilkan loading
      btn.disabled = true;
      btn.textContent = '⏳ Memproses...';
      
      let result;
      
      switch(method) {
        case 'bca':
        case 'mandiri':
        case 'bni':
        case 'bri':
          result = await createVirtualAccount(orderId, amount, method);
          if (result.success) {
            // Tampilkan halaman detail VA
            showVAPage(result.virtualAccount, result.howToPayUrl, orderId, method);
          } else {
            alert('❌ Gagal membuat Virtual Account: ' + result.error);
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText || '🏦 ' + method.toUpperCase();
          }
          break;
          
        case 'qris':
          result = await createQRIS(orderId, amount);
          if (result.success) {
            showQRISPage(result.qrImage, result.qrUrl, orderId);
          } else {
            alert('❌ Gagal membuat QRIS: ' + result.error);
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText || '📱 QRIS';
          }
          break;
          
        case 'gopay':
        case 'dana':
          result = await createEWallet(orderId, amount, method);
          if (result.success) {
            // Redirect ke halaman pembayaran e-wallet
            window.location.href = result.paymentUrl;
          } else {
            alert('❌ Gagal membuat pembayaran: ' + result.error);
            btn.disabled = false;
            btn.textContent = btn.dataset.originalText || (method === 'gopay' ? '💚 GoPay' : '💙 DANA');
          }
          break;
      }
    });
  });

  function showVAPage(vaNumber, howToPayUrl, orderId, bankCode) {
    const paymentMethodsDiv = document.querySelector('.payment-methods');
    const orderInfoDiv = document.getElementById('orderInfo');
    
    paymentMethodsDiv.innerHTML = `
      <div style="text-align: center; padding: 20px;">
        <div style="font-size: 48px; margin-bottom: 20px;">🏦</div>
        <h3>Virtual Account ${bankCode.toUpperCase()}</h3>
        <div style="background: #f0f0f0; padding: 15px; border-radius: 12px; margin: 20px 0;">
          <p style="font-size: 12px; color: #666;">Nomor Virtual Account</p>
          <p style="font-size: 28px; font-weight: bold; letter-spacing: 2px;">${vaNumber}</p>
        </div>
        <button id="copyVABtn" class="copy-btn" style="margin-bottom: 20px;">📋 Copy VA Number</button>
        <div class="instruction-box" style="text-align: left; margin-top: 20px;">
          <strong>📌 Cara Pembayaran:</strong>
          <ol style="margin-top: 10px; padding-left: 20px;">
            <li>Buka aplikasi mobile banking ${bankCode.toUpperCase()}</li>
            <li>Pilih menu Transfer ke Virtual Account</li>
            <li>Masukkan nomor Virtual Account di atas</li>
            <li>Konfirmasi pembayaran sebesar Rp ${document.getElementById('payTotal').textContent}</li>
            <li>Pembayaran akan dikonfirmasi otomatis dalam beberapa menit</li>
          </ol>
        </div>
        <div class="btn-group" style="margin-top: 30px;">
          <a href="track.html?orderId=${orderId}" class="btn-primary">🔍 Cek Status</a>
          <a href="index.html" class="btn-secondary">🛒 Kembali</a>
        </div>
      </div>
    `;
    
    document.getElementById('copyVABtn').addEventListener('click', () => {
      navigator.clipboard.writeText(vaNumber);
      alert('✅ Nomor VA disalin!');
    });
  }
  
  function showQRISPage(qrImage, qrUrl, orderId) {
    const paymentMethodsDiv = document.querySelector('.payment-methods');
    
    paymentMethodsDiv.innerHTML = `
      <div style="text-align: center; padding: 20px;">
        <div style="font-size: 48px; margin-bottom: 20px;">📱</div>
        <h3>QRIS Payment</h3>
        <div style="background: white; padding: 20px; border-radius: 12px; margin: 20px auto; max-width: 250px;">
          <img src="${qrImage}" alt="QRIS Code" style="width: 100%;" />
        </div>
        <div class="instruction-box" style="text-align: left; margin-top: 20px;">
          <strong>📌 Cara Pembayaran:</strong>
          <ol style="margin-top: 10px; padding-left: 20px;">
            <li>Buka aplikasi QRIS (GoPay, DANA, OVO, LinkAja, dll)</li>
            <li>Pilih menu Scan QRIS</li>
            <li>Scan QR code di atas</li>
            <li>Konfirmasi pembayaran sebesar Rp ${document.getElementById('payTotal').textContent}</li>
            <li>Pembayaran akan dikonfirmasi otomatis</li>
          </ol>
        </div>
        <div class="btn-group" style="margin-top: 30px;">
          <a href="track.html?orderId=${orderId}" class="btn-primary">🔍 Cek Status</a>
          <a href="index.html" class="btn-secondary">🛒 Kembali</a>
        </div>
      </div>
    `;
  }

  loadOrder();
</script>

</body>
</html>
