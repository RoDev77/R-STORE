<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Pembayaran - R STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-id-container {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .order-id-text {
      font-family: monospace;
      font-size: 14px;
      background: #e8e8e8;
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #5a67d8;
      transform: scale(1.02);
    }
    .copy-btn.copied {
      background: #28a745;
    }
    .payment-method {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 16px;
    }
    .payment-method:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateX(5px);
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">🎮 R STORE – ROBUX</div>
  <a href="track.html" class="btn-track">Lacak Pesanan</a>
</nav>

<main class="main">
  <div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">💳 Pilih Metode Pembayaran</h2>
    
    <div id="orderInfo" style="margin-bottom: 30px; padding: 20px; background: #f5f5f5; border-radius: 16px;">
      <p style="margin-bottom: 12px;"><strong>🆔 Order ID:</strong></p>
      <div id="orderIdContainer" class="order-id-container"></div>
      
      <div style="margin-top: 15px;">
        <p><strong>🎮 Jumlah Robux:</strong> <span id="payRobux">0</span></p>
        <p><strong>💰 Total:</strong> <span id="payTotal">Rp 0</span></p>
      </div>
    </div>

    <div class="payment-methods" style="display: flex; flex-direction: column; gap: 12px;">
      <button class="payment-method" data-method="qris">
        <span>📱 QRIS (Scan QRIS)</span>
      </button>
      <button class="payment-method" data-method="bca">
        <span>🏦 BCA Virtual Account</span>
      </button>
      <button class="payment-method" data-method="mandiri">
        <span>🏦 Mandiri Virtual Account</span>
      </button>
      <button class="payment-method" data-method="gopay">
        <span>💚 GoPay</span>
      </button>
      <button class="payment-method" data-method="dana">
        <span>💙 DANA</span>
      </button>
    </div>

    <div id="paymentNote" style="margin-top: 20px; font-size: 13px; color: #666; text-align: center;">
      ⚡ Demo mode - Integrasi DOKU akan segera hadir
    </div>
  </div>
</main>

<footer class="footer">© 2025 R Store — Unofficial Roblox Store</footer>

<script type="module">
  import { db, doc, getDoc, updateDoc } from './firebase-config.js';

  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('orderId');

  if (!orderId) {
    alert('Order ID tidak ditemukan!');
    window.location.href = 'index.html';
  }

  // Fungsi copy ke clipboard
  async function copyToClipboard(text, buttonElement) {
    try {
      await navigator.clipboard.writeText(text);
      const originalText = buttonElement.textContent;
      buttonElement.textContent = '✅ Tersalin!';
      buttonElement.classList.add('copied');
      setTimeout(() => {
        buttonElement.textContent = originalText;
        buttonElement.classList.remove('copied');
      }, 2000);
    } catch (err) {
      alert('Gagal menyalin. Silakan copy manual.');
    }
  }

  // Tampilkan info order
  async function loadOrder() {
    const orderRef = doc(db, 'orders', orderId);
    const orderSnap = await getDoc(orderRef);
    
    if (!orderSnap.exists()) {
      alert('❌ Pesanan tidak ditemukan atau sudah kadaluarsa (2 jam). Silakan buat pesanan baru.');
      window.location.href = 'index.html';
      return;
    }
    
    const data = orderSnap.data();
    
    // Cek apakah sudah expired
    const expireAt = data.expireAt?.toDate();
    if (expireAt && new Date() > expireAt) {
      alert('❌ Pesanan sudah kadaluarsa (melewati 2 jam). Silakan buat pesanan baru.');
      window.location.href = 'index.html';
      return;
    }
    
    // Tampilkan Order ID dengan tombol copy
    const orderIdContainer = document.getElementById('orderIdContainer');
    orderIdContainer.innerHTML = `
      <span class="order-id-text">${orderId}</span>
      <button class="copy-btn" id="copyOrderIdBtn">📋 Copy</button>
    `;
    
    // Event listener untuk tombol copy
    document.getElementById('copyOrderIdBtn').addEventListener('click', (e) => {
      copyToClipboard(orderId, e.target);
    });
    
    document.getElementById('payRobux').textContent = data.robuxAmount.toLocaleString('id-ID');
    document.getElementById('payTotal').textContent = 'Rp ' + data.totalPrice.toLocaleString('id-ID');
  }

  // Handle pilih metode pembayaran
  document.querySelectorAll('.payment-method').forEach(btn => {
    btn.addEventListener('click', async () => {
      const method = btn.dataset.method;
      
      // Update status order
      const orderRef = doc(db, 'orders', orderId);
      await updateDoc(orderRef, {
        paymentMethod: method,
        status: 'waiting_payment',
        updatedAt: new Date()
      });

      // Redirect ke halaman done
      window.location.href = `done.html?orderId=${orderId}&method=${method}`;
    });
  });

  loadOrder();
</script>

</body>
</html>
