<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilih Pembayaran - R STORE</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .order-id-container {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 5px;
    }
    .order-id-text {
      font-family: monospace;
      font-size: 14px;
      background: #e8e8e8;
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      flex: 1;
    }
    .copy-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #5a67d8;
    }
    .payment-method {
      display: flex;
      align-items: center;
      gap: 15px;
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 600;
      font-size: 16px;
    }
    .payment-method:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateX(5px);
    }
    .payment-method:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .instruction-box {
      background: #e8f0fe;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 12px;
      margin: 20px 0;
      text-align: left;
    }
    .instruction-box ol {
      margin-top: 10px;
      padding-left: 20px;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .btn-primary {
      background: #667eea;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }
    .btn-primary:hover {
      background: #5a67d8;
    }
    .btn-secondary {
      background: #6c757d;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      display: none;
    }
    .loading-content {
      background: white;
      padding: 30px;
      border-radius: 16px;
      text-align: center;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .warning-badge {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">🎮 R STORE – ROBUX</div>
  <a href="track.html" class="btn-track">Lacak Pesanan</a>
</nav>

<main class="main">
  <div class="card" style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">💳 Pilih Metode Pembayaran</h2>
    
    <!-- Peringatan hanya VA yang aktif -->
    <div class="warning-badge">
      ⚡ Saat ini hanya tersedia pembayaran melalui Virtual Account (BCA, Mandiri, BRI, BNI)
    </div>
    
    <div id="orderInfo" style="margin-bottom: 30px; padding: 20px; background: #f5f5f5; border-radius: 16px;">
      <p style="margin-bottom: 12px;"><strong>🆔 Order ID:</strong></p>
      <div id="orderIdContainer" class="order-id-container"></div>
      
      <div style="margin-top: 15px;">
        <p><strong>🎮 Jumlah Robux:</strong> <span id="payRobux">0</span></p>
        <p><strong>💰 Total:</strong> <span id="payTotal">Rp 0</span></p>
      </div>
    </div>

    <div class="payment-methods" style="display: flex; flex-direction: column; gap: 12px;">
      <button class="payment-method" data-method="bca" data-bank="BCA">
        <span>🏦 BCA Virtual Account</span>
      </button>
      <button class="payment-method" data-method="mandiri" data-bank="MANDIRI">
        <span>🏦 Mandiri Virtual Account</span>
      </button>
      <button class="payment-method" data-method="bni" data-bank="BNI">
        <span>🏦 BNI Virtual Account</span>
      </button>
      <button class="payment-method" data-method="bri" data-bank="BRI">
        <span>🏦 BRI Virtual Account</span>
      </button>
    </div>
    
    <!-- Metode yang belum aktif disembunyikan -->
    <div style="display: none;">
      <button class="payment-method" data-method="qris">📱 QRIS</button>
      <button class="payment-method" data-method="gopay">💚 GoPay</button>
      <button class="payment-method" data-method="dana">💙 DANA</button>
    </div>
  </div>
</main>

<footer class="footer">© 2025 R Store — Unofficial Roblox Store</footer>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-content">
    <div class="spinner"></div>
    <p>Memproses pembayaran...</p>
  </div>
</div>

<script type="module">
  import { db, doc, getDoc, updateDoc } from './firebase-config.js';
  import { DOKU_CONFIG } from './doku-config.js';

  const urlParams = new URLSearchParams(window.location.search);
  const orderId = urlParams.get('orderId');

  if (!orderId) {
    alert('Order ID tidak ditemukan!');
    window.location.href = 'index.html';
  }

  let currentAmount = 0;

  async function copyToClipboard(text, buttonElement) {
    try {
      await navigator.clipboard.writeText(text);
      const originalText = buttonElement.textContent;
      buttonElement.textContent = '✅ Tersalin!';
      setTimeout(() => {
        buttonElement.textContent = originalText;
      }, 2000);
    } catch (err) {
      alert('Gagal menyalin.');
    }
  }

  // Redirect ke DOKU Checkout untuk Virtual Account
  async function redirectToDoku(bankCode) {
    const config = DOKU_CONFIG[DOKU_CONFIG.mode];
    
    // Map bank ke channel DOKU
    const channelMap = {
      bca: 'VIRTUAL_ACCOUNT_BCA',
      mandiri: 'VIRTUAL_ACCOUNT_MANDIRI',
      bni: 'VIRTUAL_ACCOUNT_BNI',
      bri: 'VIRTUAL_ACCOUNT_BRI'
    };
    
    // Buat URL redirect ke DOKU
    const params = new URLSearchParams({
      client_id: config.clientId,
      invoice_number: orderId,
      amount: currentAmount.toString(),
      name: 'Customer R STORE',
      email: 'customer@rstore.com',
      redirect_url: config.redirectUrl,
      expired_time: config.expiredTime.toString(),
      channel: channelMap[bankCode] || 'VIRTUAL_ACCOUNT_BCA'
    });
    
    // Simpan metode pembayaran ke database
    await updateDoc(doc(db, 'orders', orderId), {
      paymentMethod: bankCode,
      paymentChannel: channelMap[bankCode],
      status: 'redirecting_payment',
      updatedAt: new Date()
    });
    
    // Redirect ke DOKU
    window.location.href = `${config.baseUrl}/payment?${params.toString()}`;
  }

  async function loadOrder() {
    const orderRef = doc(db, 'orders', orderId);
    const orderSnap = await getDoc(orderRef);
    
    if (!orderSnap.exists()) {
      alert('❌ Pesanan tidak ditemukan. Silakan buat pesanan baru.');
      window.location.href = 'index.html';
      return;
    }
    
    const data = orderSnap.data();
    currentAmount = data.totalPrice;
    
    // Cek expired
    const expireAt = data.expireAt?.toDate();
    if (expireAt && new Date() > expireAt) {
      alert('❌ Pesanan sudah kadaluarsa (2 jam). Silakan buat pesanan baru.');
      window.location.href = 'index.html';
      return;
    }
    
    // Tampilkan Order ID
    const orderIdContainer = document.getElementById('orderIdContainer');
    orderIdContainer.innerHTML = `
      <span class="order-id-text">${orderId}</span>
      <button class="copy-btn" id="copyOrderIdBtn">📋 Copy</button>
    `;
    
    document.getElementById('copyOrderIdBtn').addEventListener('click', (e) => {
      copyToClipboard(orderId, e.target);
    });
    
    document.getElementById('payRobux').textContent = data.robuxAmount.toLocaleString('id-ID');
    document.getElementById('payTotal').textContent = 'Rp ' + data.totalPrice.toLocaleString('id-ID');
  }

  // Handle tombol pembayaran
  const loadingOverlay = document.getElementById('loadingOverlay');
  
  document.querySelectorAll('.payment-method').forEach(btn => {
    btn.addEventListener('click', async () => {
      const method = btn.dataset.method;
      const bankName = btn.dataset.bank || method.toUpperCase();
      
      if (!currentAmount) {
        alert('Error: Data pesanan tidak lengkap.');
        return;
      }
      
      // Konfirmasi ke pelanggan
      const confirmMsg = `Anda akan membayar Rp ${currentAmount.toLocaleString('id-ID')} melalui ${bankName} Virtual Account.\n\nLanjutkan?`;
      if (!confirm(confirmMsg)) return;
      
      // Tampilkan loading
      loadingOverlay.style.display = 'flex';
      btn.disabled = true;
      
      try {
        await redirectToDoku(method);
      } catch (error) {
        console.error('Error:', error);
        alert('Gagal memproses pembayaran: ' + error.message);
        loadingOverlay.style.display = 'none';
        btn.disabled = false;
      }
    });
  });

  loadOrder();
</script>

</body>
</html>
