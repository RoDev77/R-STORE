<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processing - Roblox Store</title>

<style>
body {
  font-family: system-ui, -apple-system, Segoe UI, sans-serif;
  background: linear-gradient(135deg,#667eea,#764ba2);
  min-height: 100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.box {
  background:#fff;
  border-radius:20px;
  padding:50px 40px;
  max-width:500px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.25);
}
.icon {
  font-size:96px;
  animation:pulse 1.5s infinite;
}
@keyframes pulse {
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
h1 {
  font-size:34px;
  font-weight:900;
  margin:16px 0;
}
p {
  color:#666;
  font-size:18px;
}
.detail {
  display:none;
  margin-top:24px;
  background:#f8f9fa;
  border-radius:12px;
  padding:20px;
  text-align:left;
}
.row {
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #ddd;
}
.row:last-child {border:none}
.label {color:#666;font-weight:600}
.value {font-weight:700}
.btn {
  display:none;
  margin-top:24px;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  color:#fff;
  font-weight:800;
  background:linear-gradient(135deg,#667eea,#764ba2);
}
</style>
</head>

<body>
<div class="box">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Memproses...</h1>
  <p id="msg">Pesanan kamu sedang diproses</p>

  <div class="detail" id="detail">
    <div class="row"><span class="label">Order ID</span><span class="value" id="oid">-</span></div>
    <div class="row"><span class="label">Username</span><span class="value" id="user">-</span></div>
    <div class="row"><span class="label">Robux</span><span class="value" id="rbx">-</span></div>
    <div class="row"><span class="label">Total</span><span class="value" id="price">-</span></div>
    <div class="row"><span class="label">Status</span><span class="value" id="status">-</span></div>
    <div class="row"><span class="label">Delivery</span><span class="value" id="delivery">-</span></div>
    <div class="row"><span class="label">Rate</span><span class="value" id="rate">-</span></div>
    <!-- bukti transfer -->
    <div style="margin-top:14px; display:none;" id="proofWrap">
      <div class="label" style="margin-bottom:8px;">Bukti Transfer</div>
      <img id="proofImg" alt="Bukti Transfer" style="width:100%; border-radius:12px; border:1px solid #ddd;">
    </div>
  </div>

  <a href="index.html" class="btn" id="btn">Kembali ke Store</a>
</div>

<script type="module" src="./process.js"></script>

</body>
</html>
