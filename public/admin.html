<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - R Store</title>
<link href="https://fonts.googleapis.com/css2?family=HK+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'HK Grotesk',sans-serif;background:#1a1d1f;color:#fff;min-height:100vh}
.header{background:#2a2d2f;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.logo{display:flex;align-items:center;gap:12px}
.logo h1{font-size:24px;font-weight:900}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:30px;max-width:1400px;margin:0 auto}
.stat-card{background:#2a2d2f;padding:20px;border-radius:12px;border:2px solid #3a3d3f}
.stat-card.pending{border-color:#ffa726}
.stat-card.processing{border-color:#29b6f6}
.stat-card.completed{border-color:#43e97b}
.stat-card.rejected{border-color:#ef5350}
.stat-label{color:#a0a0a0;font-size:14px;margin-bottom:8px}
.stat-value{font-size:32px;font-weight:900}
.container{max-width:1400px;margin:0 auto;padding:30px}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:10px 20px;border-radius:8px;border:2px solid #3a3d3f;background:#2a2d2f;color:#fff;font-weight:700;cursor:pointer;transition:all .3s}
.filter-btn:hover{border-color:#667eea}
.filter-btn.active{background:#667eea;border-color:#667eea}
.orders-grid{display:grid;gap:20px}
.order-card{background:#2a2d2f;border-radius:12px;padding:24px;border:2px solid #3a3d3f;transition:all .3s}
.order-card:hover{border-color:#667eea}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.order-id{font-size:18px;font-weight:900}
.status-badge{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase}
.status-pending{background:#ffa726;color:#000}
.status-processing{background:#29b6f6;color:#000}
.status-completed{background:#43e97b;color:#000}
.status-rejected{background:#ef5350;color:#fff}
.order-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px}
.detail-item{display:flex;flex-direction:column;gap:4px}
.detail-label{color:#a0a0a0;font-size:12px}
.detail-value{font-weight:700}
.proof-section{margin:16px 0;padding:16px;background:#1a1d1f;border-radius:8px}
.proof-label{color:#a0a0a0;font-size:14px;margin-bottom:8px}
.proof-img{max-width:100%;max-height:400px;border-radius:8px;cursor:pointer}
.proof-img:hover{opacity:.8}
.actions{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:8px;border:none;font-weight:700;cursor:pointer;transition:all .3s;font-family:'HK Grotesk',sans-serif}
.btn-approve{background:#43e97b;color:#000}
.btn-approve:hover{background:#38f9d7;transform:translateY(-2px)}
.btn-reject{background:#ef5350;color:#fff}
.btn-reject:hover{background:#ff6b6b;transform:translateY(-2px)}
.btn-process{background:#29b6f6;color:#000}
.btn-process:hover{background:#4fc3f7;transform:translateY(-2px)}
.btn-complete{background:#667eea;color:#fff}
.btn-complete:hover{background:#764ba2;transform:translateY(-2px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.loading{text-align:center;padding:60px;color:#a0a0a0}
.loading-spinner{width:50px;height:50px;border:4px solid #3a3d3f;border-top:4px solid #667eea;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:#a0a0a0}
.empty-icon{font-size:64px;margin-bottom:16px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#2a2d2f;border-radius:12px;padding:24px;max-width:800px;max-height:90vh;overflow:auto}
.modal-img{max-width:100%;border-radius:8px}
.close-modal{position:absolute;top:20px;right:20px;font-size:32px;color:#fff;cursor:pointer;background:#ef5350;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){
.stats{grid-template-columns:repeat(2,1fr)}
.order-details{grid-template-columns:1fr}
.actions{flex-direction:column}
}
</style>
</head>
<body>
<div class="header">
<div class="logo">
<span style="font-size:32px">🛡️</span>
<h1>ADMIN PANEL</h1>
</div>
<a href="index.html" style="color:#fff;text-decoration:none;font-weight:700">← Back to Store</a>
</div>

<div class="stats">
<div class="stat-card pending">
<div class="stat-label">Pending Orders</div>
<div class="stat-value" id="statPending">0</div>
</div>
<div class="stat-card processing">
<div class="stat-label">Processing</div>
<div class="stat-value" id="statProcessing">0</div>
</div>
<div class="stat-card completed">
<div class="stat-label">Completed</div>
<div class="stat-value" id="statCompleted">0</div>
</div>
<div class="stat-card rejected">
<div class="stat-label">Rejected</div>
<div class="stat-value" id="statRejected">0</div>
</div>
</div>

<div class="container">
<div class="filters">
<button class="filter-btn active" onclick="filterOrders('all')">All Orders</button>
<button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
<button class="filter-btn" onclick="filterOrders('processing')">Processing</button>
<button class="filter-btn" onclick="filterOrders('completed')">Completed</button>
<button class="filter-btn" onclick="filterOrders('rejected')">Rejected</button>
<button class="filter-btn" onclick="loadOrders()" style="margin-left:auto;background:#667eea">🔄 Refresh</button>
</div>

<div id="loading" class="loading">
<div class="loading-spinner"></div>
<p>Loading orders...</p>
</div>

<div id="emptyState" class="empty-state" style="display:none">
<div class="empty-icon">📦</div>
<h3>No Orders Found</h3>
<p>Orders will appear here when customers place them</p>
</div>

<div id="ordersGrid" class="orders-grid"></div>
</div>

<div class="modal" id="imageModal">
<div class="close-modal" onclick="closeModal()">×</div>
<div class="modal-content">
<img id="modalImg" class="modal-img">
</div>
</div>

<script>
let allOrders=[];
let currentFilter='all';
const DISCORD_WEBHOOK="https://discord.com/api/webhooks/1451905582117425215/2ZkLzr6avvdxXx-kd8gMNbJ2F11VyADWFji9gx-TAf6pOm5zCfth1wslEigh6S1ttBWE";

async function loadOrders(){
document.getElementById('loading').style.display='block';
document.getElementById('ordersGrid').innerHTML='';
document.getElementById('emptyState').style.display='none';
try{
const response=await fetch('https://r-store-rho.vercel.app/api/orders/list');
const data=await response.json();
if(data.success&&data.data){
allOrders=data.data;
updateStats();
filterOrders(currentFilter);
}else{
document.getElementById('emptyState').style.display='block';
}
}catch(error){
console.error('Error loading orders:',error);
alert('Failed to load orders');
}
document.getElementById('loading').style.display='none';
}

function updateStats(){
const stats={pending:0,processing:0,completed:0,rejected:0};
allOrders.forEach(order=>{
const status=(order.status||'pending').toLowerCase();
if(stats[status]!==undefined)stats[status]++;
});
document.getElementById('statPending').textContent=stats.pending;
document.getElementById('statProcessing').textContent=stats.processing;
document.getElementById('statCompleted').textContent=stats.completed;
document.getElementById('statRejected').textContent=stats.rejected;
}

function filterOrders(filter){
currentFilter=filter;
document.querySelectorAll('.filter-btn').forEach(btn=>{
btn.classList.remove('active');
});
event?.target?.classList.add('active');
const filtered=filter==='all'?allOrders:allOrders.filter(o=>(o.status||'pending').toLowerCase()===filter);
displayOrders(filtered);
}

function displayOrders(orders){
const grid=document.getElementById('ordersGrid');
const empty=document.getElementById('emptyState');
if(orders.length===0){
grid.innerHTML='';
empty.style.display='block';
return;
}
empty.style.display='none';
grid.innerHTML=orders.map(order=>createOrderCard(order)).join('');
}

function createOrderCard(order){
const status=(order.status||'pending').toLowerCase();
const statusClass=`status-${status}`;
const proofUrl=order.proofUrl||'https://via.placeholder.com/400x300?text=No+Proof';
return`
<div class="order-card">
<div class="order-header">
<div class="order-id">${order.orderId||order.id}</div>
<span class="status-badge ${statusClass}">${status}</span>
</div>
<div class="order-details">
<div class="detail-item">
<span class="detail-label">Username</span>
<span class="detail-value">${order.username||'-'}</span>
</div>
<div class="detail-item">
<span class="detail-label">Robux Amount</span>
<span class="detail-value">${(order.amount||0).toLocaleString('id-ID')} Robux</span>
</div>
<div class="detail-item">
<span class="detail-label">Total Price</span>
<span class="detail-value">${order.price||'-'}</span>
</div>
<div class="detail-item">
<span class="detail-label">Delivery</span>
<span class="detail-value">${order.delivery||order.deliveryType||'-'}</span>
</div>
<div class="detail-item">
<span class="detail-label">Created</span>
<span class="detail-value">${order.createdAt?new Date(order.createdAt).toLocaleString('id-ID'):'-'}</span>
</div>
</div>
<div class="proof-section">
<div class="proof-label">Payment Proof:</div>
<img src="${proofUrl}" class="proof-img" onclick="openModal('${proofUrl}')" alt="Payment Proof">
</div>
<div class="actions">
${getActionButtons(order)}
</div>
</div>
`;
}

function getActionButtons(order){
const status=(order.status||'pending').toLowerCase();
const orderId=order.orderId||order.id;
if(status==='pending'){
return`
<button class="btn btn-approve" onclick="updateOrderStatus('${orderId}','processing')">✅ Approve & Process</button>
<button class="btn btn-reject" onclick="updateOrderStatus('${orderId}','rejected')">❌ Reject Order</button>
`;
}else if(status==='processing'){
return`
<button class="btn btn-complete" onclick="updateOrderStatus('${orderId}','completed')">✅ Mark as Completed</button>
<button class="btn btn-reject" onclick="updateOrderStatus('${orderId}','rejected')">❌ Cancel Order</button>
`;
}else if(status==='completed'){
return`<button class="btn" disabled style="background:#43e97b;color:#000">✅ Order Completed</button>`;
}else if(status==='rejected'){
return`<button class="btn" disabled style="background:#ef5350;color:#fff">❌ Order Rejected</button>`;
}
}

async function updateOrderStatus(orderId,newStatus){
const confirmMsg=newStatus==='rejected'?
'Are you sure you want to REJECT this order?':
newStatus==='completed'?
'Confirm that Robux has been sent to customer?':
'Approve this order and start processing?';
if(!confirm(confirmMsg))return;
try{
const response=await fetch(`https://r-store-rho.vercel.app/api/orders/update?id=${orderId}`,{
method:'PUT',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status:newStatus})
});
const data=await response.json();
if(data.success){
await sendDiscordNotification(orderId,newStatus);
alert(`✅ Order ${orderId} updated to ${newStatus.toUpperCase()}`);
loadOrders();
}else{
alert('❌ Failed to update order: '+data.error);
}
}catch(error){
console.error('Error:',error);
alert('❌ Failed to update order');
}
}

async function sendDiscordNotification(orderId,status){
const order=allOrders.find(o=>(o.orderId||o.id)===orderId);
if(!order)return;
const statusEmoji={processing:'✅',completed:'🎉',rejected:'❌'};
const statusText={processing:'APPROVED & PROCESSING',completed:'COMPLETED',rejected:'REJECTED'};
const embed={
title:`${statusEmoji[status]} Order Status Updated`,
color:status==='completed'?4437115:status==='rejected'?15680848:3066993,
fields:[
{name:'Order ID',value:orderId,inline:false},
{name:'Status',value:statusText[status],inline:true},
{name:'Username',value:order.username||'-',inline:true},
{name:'Robux',value:(order.amount||0).toLocaleString('id-ID'),inline:true},
{name:'Price',value:order.price||'-',inline:true},
{name:'Updated',value:new Date().toLocaleString('id-ID'),inline:false}
],
footer:{text:'R STORE Admin Panel'},
timestamp:new Date().toISOString()
};
try{
await fetch(DISCORD_WEBHOOK,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({content:`📢 **ORDER UPDATE**`,embeds:[embed]})
});
}catch(e){
console.error('Discord notification failed:',e);
}
}

function openModal(imgUrl){
document.getElementById('modalImg').src=imgUrl;
document.getElementById('imageModal').classList.add('show');
}

function closeModal(){
document.getElementById('imageModal').classList.remove('show');
}

document.getElementById('imageModal').onclick=function(e){
if(e.target===this)closeModal();
};

loadOrders();
setInterval(loadOrders,30000);
</script>
</body>
</html>
